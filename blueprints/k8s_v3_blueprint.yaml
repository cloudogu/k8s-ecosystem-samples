apiVersion: k8s.cloudogu.com/v3
kind: Blueprint
metadata:
  labels:
    app: ces
    app.kubernetes.io/name: k8s-blueprint-lib
  name: blueprint-v3-sample
spec:
  displayName: "Blueprint v3 sample"
  blueprint:
    config:
      dogus:
        cas:
          - key: oidc/enabled
            value: "false"
          - key: oidc/discovery_uri
            value: https://account.cloudogu.com/auth/realms/Cloudogu/.well-known/openid-configuration
          - key: oidc/client_id
            value: k8s-ces-traefik-test
          - key: oidc/display_name
            value: Cloudogu-Platform
          - key: oidc/scopes
            value: openid,email,profile,groups
          - key: oidc/principal_attribute
            value: preferred_username
          - key: oidc/attribute_mapping
            value: email:mail,family_name:surname,given_name:givenName,preferred_username:username,name:displayName,groups:externalGroups
          - key: oidc/allowed_groups
            value: ZybHJmqk
          - key: oidc/initial_admin_usernames
            value: admin
          - key: oidc/client_secret
            secretRef:
              key: cas_oidc_client_secret
              name: ecosystem-core-setup-credentials
            sensitive: true
        ldap:
          - key: fqdn
            value: 34.159.243.138
          - key: domain
            value: "243.138"
          - key: certificate/type
            value: selfsigned
          - key: password-policy/min_length
            value: "1"
          - key: password-policy/must_contain_capital_letter
            value: "false"
          - key: password-policy/must_contain_digit
            value: "false"
          - key: password-policy/must_contain_lower_case_letter
            value: "false"
          - key: password-policy/must_contain_special_character
            value: "false"
          - key: admin_group
            value: cesAdmin
    dogus:
      - name: "official/ldap"
        version: "2.6.10-7"
      - name: "official/mysql"
        version: "8.4.9-1"
      - name: "official/cas"
        version: "7.2.7-15"
      - name: "official/smeagol"
        version: "1.7.8-6"
      - name: "hallowelt/bluespice-collabpadsbackend"
        version: "5.1.5-2"
      - name: "hallowelt/bluespice-mathoid"
        version: "5.1.5-7"
      - name: "hallowelt/bluespice-opensearch"
        version: "2.19.4-2"
      - name: "hallowelt/bluespice-pdfrenderer"
        version: "5.1.5-2"
      - name: "hallowelt/bluespice"
        version: "5.1.5-4"
      - name: "hallowelt/drawio"
        version: "29.2.9-2"
      - name: "hallowelt/mongodb"
        version: "8.2.3-3"
      - name: "itz-bund/easyredmine"
        version: "14.6.0-10"
      - name: "official/gotenberg"
        version: "8.31.0-1"
      - name: "official/jenkins"
        version: "2.555.1-1"
      - name: "official/nexus"
        version: "3.86.2-6"
      - name: "official/redis"
        version: "6.2.21-4"
      - name: "official/redmine"
        version: "6.1.1-6"
      - name: "official/scm"
        version: "3.11.8-1"
      - name: "official/sonar"
        version: "25.12.0-9"
      - name: "official/swaggerui"
        version: "5.32.4-1"
      - name: "official/usermgt"
        version: "1.21.0-4"
      - name: "premium/admin"
        version: "2.17.3-2"
      - name: "official/plantuml"
        version: "2026.2-1"
      - name: "official/cockpit"
        version: "2.3.0-9"
      - name: "official/postgresql"
        version: "14.22-1"
      - name: "official/postfix"
        version: "3.10.8-3"
      - name: "premium/grafana"
        version: "11.6.13-3"
      - name: "premium/portainer"
        version: "2.39.1-1"
      - name: "itz-bund/teamscale"
        version: "2025.6.13-6"
      - name: "itz-bund/baseline"
        version: "1.6.1-2"
      - name: "premium/whitelabeling"
        version: "1.2.1-2"
  blueprintMask:
    manifest:
      dogus:
        - absent: false
          name: "official/mysql"
